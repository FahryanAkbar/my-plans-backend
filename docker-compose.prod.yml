services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: myplans-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: myplans-api
    restart: unless-stopped
    env_file:
      - ./api/.env
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/monitoring/health', (r) => { if (r.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.prod
    container_name: myplans-worker
    restart: unless-stopped
    env_file:
      - ./worker/.env
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: myplans-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myplans_user
      POSTGRES_PASSWORD: GANTI_PASSWORD_POSTGRES_YANG_KUAT
      POSTGRES_DB: monitoring
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myplans_user -d monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: myplans-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2
    container_name: myplans-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: GANTI_PASSWORD_INFLUX_ADMIN
      DOCKER_INFLUXDB_INIT_ORG: my-plans
      DOCKER_INFLUXDB_INIT_BUCKET: monitoring
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: GANTI_TOKEN_INFLUX_YANG_PANJANG
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  influxdb-data:
